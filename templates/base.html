<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VolleyLearn{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    :root {
      --sand:    #F5E6C8;
      --court:   #3B82A0;
      --net:     #E8C547;
      --spike:   #E05C3A;
      --dark:    #1A1A2E;
      --mid:     #2D2D44;
      --light:   #F8F4ED;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
    }

    /* ---- NAV ---- */
    nav {
      background: var(--mid);
      border-bottom: 3px solid var(--net);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      color: var(--net);
      letter-spacing: 2px;
      text-decoration: none;
    }
    .nav-logo span { color: var(--spike); }

    /* ---- PROGRESS BAR ---- */
    .progress-wrap {
      background: var(--mid);
      padding: 10px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .progress {
      background: rgba(255,255,255,0.1);
      height: 8px;
      border-radius: 99px;
    }
    .progress-bar {
      background: linear-gradient(90deg, var(--court), var(--net));
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .progress-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }

    /* ---- CARDS ---- */
    .vl-card {
      background: var(--mid);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 36px;
    }

    /* ---- BUTTONS ---- */
    .btn-vl {
      background: var(--net);
      color: var(--dark);
      font-family: 'Bebas Neue', cursive;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      padding: 12px 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-vl:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,197,71,0.35);
    }
    .btn-vl-outline {
      background: transparent;
      border: 2px solid var(--net);
      color: var(--net);
    }
    .btn-vl-outline:hover {
      background: var(--net);
      color: var(--dark);
    }
    .btn-vl-spike {
      background: var(--spike);
      color: white;
    }
    .btn-vl-spike:hover {
      box-shadow: 0 6px 20px rgba(224,92,58,0.4);
    }

    /* ---- SECTION TITLE ---- */
    .section-title {
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 2px;
      color: var(--net);
      font-size: 0.85rem;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .page-heading {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.6rem;
      line-height: 1.1;
      letter-spacing: 1px;
    }

    /* ---- FACT PILLS ---- */
    .fact-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59,130,160,0.2);
      border: 1px solid rgba(59,130,160,0.4);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #9dd5ef;
    }
    .fact-pill::before { content: "✓"; color: var(--court); font-weight: bold; }

    /* ---- SELECTION OPTIONS ---- */
    .selection-option {
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 20px;
      transition: all 0.2s;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .selection-option:hover { border-color: var(--net); background: rgba(232,197,71,0.08); }
    .selection-option input[type="radio"] { accent-color: var(--net); width: 16px; height: 16px; }
    .selection-option.selected { border-color: var(--net); background: rgba(232,197,71,0.12); }

    /* ---- QUIZ OPTION ---- */
    .quiz-option {
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 22px;
      transition: all 0.2s;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .quiz-option:hover { border-color: var(--court); background: rgba(59,130,160,0.1); }
    .quiz-option input[type="radio"] { accent-color: var(--court); width: 16px; height: 16px; flex-shrink: 0; }
    .quiz-option.selected { border-color: var(--court); background: rgba(59,130,160,0.18); }
    .option-letter {
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      color: var(--court);
      width: 22px;
      flex-shrink: 0;
    }

    /* ---- RESULT ---- */
    .result-correct { color: #5dd87b; }
    .result-wrong { color: var(--spike); }
    .breakdown-row {
      border-left: 4px solid transparent;
      padding-left: 16px;
      margin-bottom: 20px;
    }
    .breakdown-row.correct { border-color: #5dd87b; }
    .breakdown-row.wrong { border-color: var(--spike); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Volley<span>Learn</span> 🏐</a>
  <span style="font-size:0.8rem; color:rgba(255,255,255,0.4);">Learn · Build · Play</span>
</nav>

{% block progress %}{% endblock %}

<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  // Highlight selected radio options
  $(document).on('change', 'input[type="radio"]', function() {
    $(this).closest('form').find('.selection-option, .quiz-option').removeClass('selected');
    $(this).closest('.selection-option, .quiz-option').addClass('selected');
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
